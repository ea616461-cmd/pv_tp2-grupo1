<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 25 - Cambio de Color Aleatorio</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #2c3e50; 
            transition: background-color 0.4s ease;
        }
        .box {
            background: rgba(255, 255, 255, 0.15);
            padding: 40px;
            border-radius: 16px;
            backdrop-filter: blur(5px); 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
            text-align: center;
        }
        .btn-color {
            background-color: #ffffff;
            color: #2c3e50;
            border: none;
            padding: 15px 32px;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            transition: all 0.2s ease;
        }
        .btn-color:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.25);
        }

        .btn-color:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>

    <div class="box">
        <button id="btnGenerador" class="btn-color">Cambiar Fondo</button>
    </div>

    <script type="module" src="js/ejercicio25.js"></script>
</body>
</html>
