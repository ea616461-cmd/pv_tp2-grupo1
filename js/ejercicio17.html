<!DOCTYPE html>
<html>
<body>

<script>

const contarLetraA = (texto) => {
    let contador = 0;

    for (let letra of texto) {
        if (letra.toLowerCase() === "a") {
            contador++;
        }
    }

    return contador;
};

let palabra = prompt("Ingrese un texto");

document.write(`Cantidad de letras "a": ${contarLetraA(palabra)}`);

</script>

</body>
</html>
